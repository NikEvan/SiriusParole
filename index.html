<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Par🇮🇹le - Un gioco di parole al giorno (Wordle in italiano)</title>
    <meta name="description" content="Indovina la parola nascosta in 6 tentativi. Un nuovo puzzle ogni giorno.">

    <!-- FB Meta Tags -->
    <meta property="og:url" content="https://TUO-LINK.github.io/wordle-it/wordle.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Par🇮🇹le - Un gioco di parole al giorno (Wordle in italiano)">
    <meta property="og:description" content="Indovina la parola nascosta in 6 tentativi. Un nuovo puzzle ogni giorno.">
    <meta property="og:image" content="images/parle_og_1200x630.png">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#6aaa64" />
    <link rel="manifest" href="manifest.json" />
    <link href="images/parle_logo_32x32.png" rel="icon shortcut" sizes="32x32" />
    <link href="images/parle_logo_192x192.png" rel="apple-touch-icon" />

    <script>
      function randomAnalytics() {
        const times = 40;
        var index = Math.floor(Math.random()*times);
        if (index === 0) {
          var script = document.createElement('script');
          script.defer = true
          script.setAttribute('data-domain', 'TUO-LINK.github.io/wordle-it')
          script.src = 'https://plausible.io/js/plausible.js';
          document.getElementsByTagName('head')[0].appendChild(script);	
        }
      };
    </script>

    <style>
      /* Global Styles & Colors */
      :root {
        --green: #6aaa64;
        --darkendGreen: #538d4e;
        --yellow: #c9b458;
        --darkendYellow: #b59f3b;
        --lightGray: #d8d8d8;
        --gray: #86888a;
        --darkGray: #939598;
        --white: #fff;
        --black: #212121;
        --orange: #f5793a;
        --blue: #85c0f9;
        font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        --header-height: 50px;
        --keyboard-height: 200px;
        --game-max-width: 500px;
        --bg-dark: #0a1a2a; /* blu scuro */
      }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        color: #fff;
        overflow-y: hidden;
      }

      /* Schermata nome */
      #nameScreen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        position: absolute;
        z-index: 9999;
        background-color: var(--bg-dark);
      }

      #nameScreen h2 {
        margin-bottom: 20px;
      }

      #playerName {
        padding: 10px;
        font-size: 18px;
        border-radius: 5px;
        border: none;
        width: 200px;
        text-align: center;
      }

      #startBtn {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        background-color: var(--green);
        color: #fff;
        cursor: pointer;
      }

      #startBtn:hover {
        background-color: var(--darkendGreen);
      }
    </style>
  </head>

  <body onload="randomAnalytics();">
    <!-- SCHERMATA NOME -->
    <div id="nameScreen">
      <h2>Inserisci il tuo nome</h2>
      <input type="text" id="playerName" placeholder="Il tuo nome">
      <button id="startBtn" onclick="startGameWithName()">Inizia</button>
    </div>

    <!-- SCRIPT PER MEMORIZZARE IL NOME (solo per classifica!) -->
    <script>
      function startGameWithName() {
        const name = document.getElementById("playerName").value.trim();
        if (!name) {
          alert("Inserisci il tuo nome!");
          return;
        }
        // Salva solo per classifica, NON interferisce con la griglia
        localStorage.setItem("playerNameForScore", name);

        // Nascondi schermata nome e lascia il gioco funzionare normalmente
        document.getElementById("nameScreen").style.display = "none";
      }
    </script>

    <!-- CODICE WORDLE ORIGINALE -->
    <script>
      (function () {
        window.wordle = window.wordle || {};
        window.wordle.hash = 'parle v220317';
      })();
    </script>
    <script src="wordle-it.js"></script>
    <game-app></game-app>
  </body>
</html>
