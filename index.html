<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>SiriusPar🇮🇹le - Un gioco di parole al giorno </title>
    <meta name="description" content="Indovina la parola nascosta in 6 tentativi. Un nuovo puzzle ogni giorno.">

    <meta name="theme-color" content="#6aaa64" />
    <link rel="manifest" href="manifest.json" />
    <link href="images/parle_logo_32x32.png" rel="icon shortcut" sizes="3232" />
    <link href="images/parle_logo_192x192.png" rel="apple-touch-icon" />

    <script>
     function randomAnalytics() {
      const times = 40;
      var index = Math.floor(Math.random()*times);
      if (index === 0) {
        var script = document.createElement('script');
        script.defer = true;
        script.setAttribute('data-domain', 'pietroppeter.github.io/wordle-it');
        script.src = 'https://plausible.io/js/plausible.js';
        document.getElementsByTagName('head')[0].appendChild(script);	
      }
     };
    </script>

    <style>
      /* Global Styles & Colors */
      :root {
        --green: #6aaa64;
        --darkendGreen: #538d4e;
        --yellow: #c9b458;
        --darkendYellow: #b59f3b;
        --lightGray: #d8d8d8;
        --gray: #86888a;
        --darkGray: #939598;
        --white: #fff;
        --black: #212121;
        --orange: #f5793a;
        --blue: #85c0f9;
        font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        --header-height: 50px;
        --keyboard-height: 200px;
        --game-max-width: 500px;
      }

      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0b1d3b; /* blu scuro */
        color: #fff;
      }

      /* Schermata nome */
      #nameScreen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: #0b1d3b; /* blu scuro */
        z-index: 9999;
      }
      #nameScreen h2 {
        color: #fff;
        margin-bottom: 20px;
      }
      #nameScreen input {
        padding: 10px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        width: 200px;
      }
      #nameScreen button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #6aaa64;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      #nameScreen button:hover {
        background-color: #538d4e;
      }

      /* Gioco */
      game-app {
        display: block;
        background-color: #0b1d3b; /* blu scuro */
        color: #fff;
      }

      /* Classifica */
      #leaderboard {
        margin-top: 20px;
        text-align: center;
        color: #fff;
      }
    </style>
  </head>

  <body onload="randomAnalytics();">
    <!-- Schermata Nome -->
    <div id="nameScreen">
      <h2>Inserisci il tuo nome</h2>
      <input type="text" id="playerName" placeholder="Il tuo nome">
      <button onclick="startGameWithName()">Inizia</button>
    </div>

    <script>
      // Memorizza nome senza precompilare griglia
      function startGameWithName() {
        const name = document.getElementById("playerName").value.trim();
        if (!name) {
          alert("Inserisci il tuo nome!");
          return;
        }
        // Solo memorizzazione per la classifica
        localStorage.setItem("playerName", name);
        document.getElementById("nameScreen").style.display = "none";
      }
    </script>

    <script>
      (function () {
        window.wordle = window.wordle || {};
        window.wordle.hash = 'parle v220317';
      })();
    </script>

    <!-- Gioco -->
    <script src="wordle-it.js"></script>
    <game-app></game-app>

    <!-- Classifica -->
    <div id="leaderboard"></div>

    <!-- Firebase (per classifica online) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "QUI_LA_TUA",
        authDomain: "QUI_LA_TUA",
        projectId: "QUI_LA_TUA",
        storageBucket: "QUI_LA_TUA",
        messagingSenderId: "QUI_LA_TUA",
        appId: "QUI_LA_TUA"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Salva punteggio su Firebase
      window.saveScore = async function(name, attempts) {
        const today = new Date().toISOString().split("T")[0];
        await addDoc(collection(db, "scores"), { name, attempts, date: today });
        loadLeaderboard();
      }

      // Carica classifica del giorno
      window.loadLeaderboard = async function() {
        const today = new Date().toISOString().split("T")[0];
        const q = query(collection(db, "scores"), orderBy("attempts"));
        const querySnapshot = await getDocs(q);
        const leaderboardDiv = document.getElementById("leaderboard");
        leaderboardDiv.innerHTML = "<h3>Classifica di oggi</h3>";
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          if (data.date === today) {
            leaderboardDiv.innerHTML += `<p>${data.name} - ${data.attempts} tentativi</p>`;
          }
        });
      }
    </script>
  </body>
</html>
